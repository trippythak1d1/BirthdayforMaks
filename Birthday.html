<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>8 march · zvezdyl'ka</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="card">
    <header>
        <div class="time-main date">13:13</div>
        <div class="date">8 march</div>
    </header>
    <section>
        <div class="description-navigate">
            <img src="img/Vector.png" alt="Стрелочка назад">
            <div class="to">for zvezdyl'ka</div>
            <img src="img/иконка камеры.png" alt="камера">
        </div>
        <div class="cover"><img src="img/ablojka.png" alt="Обложка трека"></div>
        <div class="description-navigate">
            <img src="img/кнопка повтор.png" alt="">
            <div class="to">17 lines for you</div>
            <img src="img/кнопка шейка.png" alt="">
        </div>
        <div class="timeline-music">
            <img src="img/timeline.png" alt="">
        </div>
        <div class="description-music">
            <p>13:01</p>
            <p>-2026</p>
        </div>
        <div class="play-music">
            <div class="bar">
                <div class="eclipse"><img src="img/playorder.png" alt=""></div>
                <div class="eclipse"><img src="img/playlist.png" alt=""></div>
            </div>
            <div class="start-music">
                <div class="start">
                    <img src="img/right-arrow.png" alt="">
                    <button id="playPauseBtn"><img src="img/pauses.png" alt=""></button>
                    <img src="img/left-arrow.png" alt="">
                </div>
                <div>
                    <img src="img/heart.png" alt="">
                </div>
            </div>
            <div class="bar">
                <div class="eclipse"><img src="img/more-horisontal.png" alt=""></div>
                <div class="eclipse"><img src="img/moon.png" alt=""></div>
            </div> 
        </div>
        <div class="shadow"></div>
    </section>
  </div>
  <audio id="audioPlayer" src="audio/Lil_Peep_-_16_Lines_60240417.mp3" preload="auto"></audio>
  <script src="script.js"></script>
</body>

</html>
